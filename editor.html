<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IBM i Web IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: ui-monospace, monospace; }
        textarea { 
            background: #000000; color: #10b981; border: 1px solid #1e293b;
            font-family: 'JetBrains Mono', 'Courier New', monospace; resize: none;
        }
        li:hover { background: #1e293b; }
        .active { border-left: 4px solid #3b82f6; background: #1e293b; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">
    <div class="max-w-7xl mx-auto w-full h-full flex flex-col">
        <header class="flex justify-between items-center mb-4 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-xl font-black text-blue-500 uppercase tracking-tighter">
                    IBM i <span class="text-white">Web IDE</span>
                </h1>
                <p id="curFile" class="text-[10px] text-slate-500 font-bold mt-1 uppercase">
                    Cargando explorador...
                </p>
            </div>
            <button onclick="save()" class="bg-blue-600 hover:bg-blue-500 px-8 py-2 rounded-lg font-bold text-sm">
                GUARDAR (SAVE)
            </button>
        </header>

        <div class="flex flex-1 gap-4 overflow-hidden">
            <div class="w-64 bg-slate-900/50 border border-slate-800 rounded-2xl p-2 overflow-y-auto">
                <h2 class="text-[10px] font-black text-slate-600 uppercase tracking-widest p-2">Explorador</h2>
                <ul id="files" class="text-sm space-y-1"></ul>
            </div>
            <div class="flex-1 bg-black rounded-2xl border border-slate-800 overflow-hidden">
                <textarea id="ed" class="w-full h-full p-6 outline-none spellcheck-false" 
                          placeholder="Seleccione un archivo..."></textarea>
            </div>
        </div>
    </div>

    <script>
        let cur = '';
        async function load() {
            console.log('[CLIENTE] Pidiendo /api/list...');
            try {
                const r = await fetch('/api/list');
                if (!r.ok) throw new Error('Status: ' + r.status);
                const d = await r.json();
                const l = document.getElementById('files');
                l.innerHTML = '';
                d.root.forEach(f => add(f, f, l));
                d.public.forEach(f => add('public/' + f, f, l));
                document.getElementById('curFile').innerText = 'Listo';
            } catch(e) { 
                console.error('[CLIENTE] Error:', e);
                document.getElementById('curFile').innerText = 'ERROR AL CARGAR LISTA';
            }
        }
        function add(p, n, l) {
            const i = document.createElement('li');
            i.className = 'p-3 rounded-xl cursor-pointer transition-all flex items-center gap-2';
            const color = p.includes('/') ? 'bg-amber-500' : 'bg-blue-500';
            i.innerHTML = `<span class="w-2 h-2 rounded-full ${color}"></span><span class="truncate">${n}</span>`;
            i.onclick = async () => {
                const res = await fetch('/api/read?path=' + encodeURIComponent(p));
                document.getElementById('ed').value = await res.text();
                cur = p;
                document.getElementById('curFile').innerText = 'Editando: ' + p;
                document.querySelectorAll('li').forEach(el => el.classList.remove('active'));
                i.classList.add('active');
            };
            l.appendChild(i);
        }
        async function save() {
            if(!cur) return alert('Elija archivo');
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: cur, content: document.getElementById('ed').value })
            });
            if(res.ok) alert('Archivo guardado en el IFS');
        }
        load();
    </script>
</body>
</html>
